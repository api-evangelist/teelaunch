actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket protocol surface exists. Teelaunch's public API is
    request/response REST (OpenAPI 3.0). The only push mechanism is an outbound
    shipment-tracking webhook (server-to-endpoint HTTP), which is not a WebSocket,
    so no AsyncAPI document was created.
