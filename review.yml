aid: teelaunch
name: Teelaunch
review:
  question: Does Teelaunch expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Teelaunch's published public surface is a
    request/response REST API (OpenAPI 3.0) over HTTPS. The only server-initiated
    push in Teelaunch's integration model is an outbound webhook that posts
    shipment tracking to a merchant-configured URL - server-to-endpoint HTTP, not
    a WebSocket or SSE transport on Teelaunch's own API. There is no bidirectional
    or streaming socket to model, so no AsyncAPI was created.
findings:
  summary: |
    Teelaunch does not publish a documented public WebSocket API. Teelaunch is a
    print-on-demand (POD) platform, primarily consumed as a storefront app on
    Shopify, Etsy, and BigCommerce, but it also publishes a documented standalone
    public REST API at base https://api.teelaunch.com/api/v1, described by an
    OpenAPI 3.0 document (https://api.teelaunch.com/api-docs.json) and a Postman
    collection (https://api.teelaunch.com/apiCollection.json). The API is
    authenticated with a Bearer (JWT) token generated from the account's Developer
    Settings; accounts must be verified (typically within 24-72 hours) before the
    token functions. All 35 documented operations are request/response REST over
    HTTPS. Teelaunch communicates shipment tracking back to external systems via an
    outbound webhook URL configured in Developer Settings, not via a socket. No
    realtime, bidirectional, or streaming WebSocket (ws:// or wss://) endpoint is
    documented anywhere in Teelaunch's API reference as of the review date.
  accessModel: |
    Public and self-service but gated behind account verification. Any Teelaunch
    account holder can generate an API token; there is no separate API subscription
    fee. Teelaunch is app-first (Shopify/Etsy/BigCommerce) but the REST API is a
    genuine standalone product surface, positioned for developers and high-volume
    merchants who need automation beyond the storefront apps.
  endpointsModeled: false
  endpointsSource: |
    All endpoints below are transcribed from Teelaunch's own published OpenAPI 3.0
    document and Postman collection - they are confirmed, not modeled.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.teelaunch.com/api/v1
      documented: true
      note: Full public REST API, OpenAPI 3.0, Bearer/JWT auth. 35 documented operations.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outbound shipment-tracking webhook posted to a URL configured in Developer Settings. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Teelaunch's API reference as of the review date.
