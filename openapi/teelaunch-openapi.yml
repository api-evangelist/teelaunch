      operationId: 7bd6346eeb8f9e067822a1bb5e554f97
      parameters:
      - name: id
        in: path
        description: The ID of the blank category to retrieve.
        required: true
        schema:
          type: integer
      responses:
        '200':
          description: Successful response
        '500':
          description: Internal Server Error
      security:
      - bearerAuth: []
  /categories/{id}/blanks:
    get:
