description: >-
  FinOps view of Teelaunch spend. Teelaunch charges no monthly platform fee and no
  separate API fee - cost is entirely transactional, incurred per produced order as
  a per-item production (base) cost plus destination shipping, deducted from your
  sale price. Spend therefore scales directly with fulfilled order volume and
  product mix. The dominant cost drivers are per-SKU base cost, shipping
  destination, and order/return volume; margin is the sale price minus base cost
  minus shipping.
notes: >-
  Per-SKU base costs and shipping rates are set per product and per destination and
  are not reconciled here. The API exposes real cost signals - GET /blanks and its
  variants return product base cost, and GET /blanks/country/shipping/cost/{id}
  returns per-country shipping cost - which can feed margin and landed-cost
  calculations. Verify current rates against the live catalog.
