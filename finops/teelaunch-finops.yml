meters:
- name: production_cost
  description: Per-item production (base) cost for each produced order line item.
  unit: items
  aggregation: sum
  dimensions:
  - account
  - product
  - blank
- name: shipping_cost
  description: Per-shipment shipping cost, varying by destination country and product.
  unit: shipments
  aggregation: sum
  dimensions:
  - account
  - destination
- name: order_volume
  description: Count of produced orders driving transactional spend.
  unit: orders
  aggregation: sum
  dimensions:
  - account
  - platform
  - store
principles:
- name: Visibility
  description: Track per-order production and shipping cost by product, platform, and store using the orders and blanks endpoints; reconcile against payment history (GET /account/payment-history).
- name: Allocation
  description: Map orders to platforms and stores so POD spend allocates to the sales channel and product line that generated it.
- name: Optimization
  description: Use per-blank base cost and per-country shipping-cost lookups to pick lower-cost SKUs and destinations, and set retail prices that preserve margin after base cost and shipping.
- name: Accountability
  description: Assign owners per store/platform and review fulfilled order volume and margin against pricing on a regular cadence.
